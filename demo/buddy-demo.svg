<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 480" font-family="'Courier New',Courier,monospace" font-size="12.5">
  <style>
    .bg { fill: #1e1e2e; }
    .t { fill: #cdd6f4; }
    .g { fill: #a6e3a1; }
    .y { fill: #f9e2af; }
    .c { fill: #94e2d5; }
    .m { fill: #f5c2e7; }
    .d { fill: #6c7086; }
    .r { fill: #f38ba8; }
    @keyframes f1 { 0%,14% { opacity:1 } 18%,100% { opacity:0 } }
    @keyframes f2 { 0%,18% { opacity:0 } 22%,38% { opacity:1 } 42%,100% { opacity:0 } }
    @keyframes f3 { 0%,42% { opacity:0 } 46%,62% { opacity:1 } 66%,100% { opacity:0 } }
    @keyframes f4 { 0%,66% { opacity:0 } 70%,100% { opacity:1 } }
    .s1 { animation: f1 10s infinite; }
    .s2 { animation: f2 10s infinite; }
    .s3 { animation: f3 10s infinite; }
    .s4 { animation: f4 10s infinite; }
  </style>
  <rect class="bg" width="620" height="480" rx="8"/>

  <!-- Stage 1: Egg -->
  <g class="s1">
    <text x="30" y="40" class="g">$ buddy_hatch --name Nuzzlecap</text>
    <text x="30" y="75" class="y">🥚 An egg appears...</text>
    <text x="90" y="120" class="t">.--.</text>
    <text x="82" y="138" class="t">/    \</text>
    <text x="75" y="156" class="t">|  ??  |</text>
    <text x="82" y="174" class="t">\    /</text>
    <text x="90" y="192" class="t">'--'</text>
    <text x="30" y="235" class="y">...cracks are forming!</text>
    <text x="95" y="270" class="t">*</text>
    <text x="90" y="288" class="t">.--.</text>
    <text x="82" y="306" class="t">/ *  \</text>
    <text x="75" y="324" class="t">| \??/ |</text>
    <text x="82" y="342" class="t">\  * /</text>
    <text x="90" y="360" class="t">'--'</text>
  </g>

  <!-- Stage 2: Reveal + Card -->
  <g class="s2">
    <text x="30" y="40" class="m">✨ It's hatching!!</text>
    <text x="72" y="80" class="y">·  ✦  ·</text>
    <text x="65" y="98" class="y">✦ ·  · ✦</text>
    <text x="85" y="118" class="m">(   )</text>
    <text x="68" y="136" class="m">.-o-OO-o-.</text>
    <text x="63" y="154" class="m">(__________)</text>
    <text x="85" y="172" class="m">|.  .|</text>
    <text x="85" y="190" class="m">|____|</text>
    <text x="65" y="212" class="y">✦ ·  · ✦</text>
    <text x="72" y="230" class="y">·  ✦  ·</text>
    <text x="30" y="270" class="c">Nuzzlecap</text>
    <text x="30" y="290" class="g">★★ UNCOMMON Mushroom</text>
    <text x="30" y="320" class="d">"An interconnected mushroom wielding</text>
    <text x="30" y="338" class="d"> devastatingly precise feedback..."</text>
    <text x="30" y="370" class="t">SNARK</text><text x="100" y="370" class="y">█████▓░░</text><text x="175" y="370" class="t">70</text>
    <text x="30" y="388" class="t">PATIENCE</text><text x="100" y="388" class="g">██▓░░░░░</text><text x="175" y="388" class="t">34</text>
    <text x="30" y="420" class="d">Nuzzlecap is here · it'll chime in as you code</text>
  </g>

  <!-- Stage 3: Observe + Pet -->
  <g class="s3">
    <text x="30" y="40" class="g">$ buddy_observe "wrote a clean CSV parser"</text>
    <text x="30" y="80" class="t">.________________________________.</text>
    <text x="30" y="98" class="t">| Solid pattern choice.          |</text>
    <text x="30" y="116" class="t">'________________________________'</text>
    <text x="340" y="88" class="d">-</text>
    <text x="380" y="70" class="m">(   )</text>
    <text x="363" y="88" class="m">.-o-OO-o-.</text>
    <text x="358" y="106" class="m">(__________)</text>
    <text x="380" y="124" class="m">|.  .|</text>
    <text x="380" y="142" class="m">|____|</text>
    <text x="370" y="165" class="c">Nuzzlecap</text>
    <text x="30" y="200" class="d">+2 XP · Lv.1 [█░░░░░░░░░] 6/45</text>
    <text x="30" y="245" class="g">$ buddy_pet</text>
    <text x="78" y="280" class="r">♥    ♥</text>
    <text x="72" y="298" class="r">♥  ♥   ♥</text>
    <text x="65" y="316" class="r">♥   ♥  ♥</text>
    <text x="85" y="340" class="m">(   )</text>
    <text x="68" y="358" class="m">.-o-OO-o-.</text>
    <text x="63" y="376" class="m">(__________)</text>
    <text x="85" y="394" class="m">|.  .|</text>
    <text x="85" y="412" class="m">|____|</text>
    <text x="30" y="445" class="c">Nuzzlecap: </text><text x="120" y="445" class="d">*spores of contentment*</text>
  </g>

  <!-- Stage 4: Persistent -->
  <g class="s4">
    <text x="30" y="40" class="g">Your buddy is persistent. Always here.</text>
    <text x="85" y="85" class="m">(   )</text>
    <text x="68" y="103" class="m">.-o-OO-o-.</text>
    <text x="63" y="121" class="m">(__________)</text>
    <text x="85" y="139" class="m">|.  .|</text>
    <text x="85" y="157" class="m">|____|</text>
    <text x="72" y="185" class="c">Nuzzlecap</text>
    <text x="65" y="205" class="d">· spreading spores</text>
    <text x="30" y="255" class="t">Close the terminal. Restart.</text>
    <text x="30" y="275" class="t">Update your CLI.</text>
    <text x="30" y="315" class="g">Your buddy is still here. 🐾</text>
    <text x="30" y="365" class="d">Works with: Claude Code · Cursor · Windsurf</text>
    <text x="30" y="383" class="d">Codex CLI · Gemini CLI · any MCP client</text>
    <text x="30" y="430" class="y">curl -fsSL https://raw.githubusercontent.com/</text>
    <text x="30" y="448" class="y">  fiorastudio/buddy/master/install.sh | bash</text>
  </g>
</svg>
